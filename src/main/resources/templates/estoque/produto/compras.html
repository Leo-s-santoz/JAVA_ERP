<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/fundo.css}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>

<body class="bg-light">
    <!--Barra Navegação-->
    <nav class="navbar navbar-expand-lg shadow-sm" style="background-color: #0d6efd; border-bottom: 8px solid #ffc107;">
        <div class="container-fluid px4 fs-5" style="margin: 0 30%">

            <div class="navbar-brand text-white fw-semibold" href="#">
                Estoque Padaria
            </div>

            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link text-white fw-medium active" aria-current="page" href="#">
                            Início
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white fw-medium" th:href="@{/cadastroProduto}">
                            Cadastro
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white fw-medium" th:href="@{/estoqueProduto}">
                            Estoque
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white fw-medium" th:href="@{/movimentacao}">
                            Movimentação
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="fundo-elipse"></div>
    <!--Conteúdo-->
    <div id="lista-pdf" class="container py-5 d-flex flex-column gap-3 justify-content-center align-items-center">
        <table>
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Quantidade Atual</th>
                    <th>Quantidade Mínima</th>
                    <th>Quantidade a Comprar</th>
                </tr>
            </thead>
            <tr th:each="item, stat : ${itensCompra}">
                <td>
                    <input type="text" th:name="'itensCompra[' + ${stat.index} + '].nome'" th:value="${item.nome}" />
                </td>

                <td>
                    <input type="number" th:name="'itensCompra[' + ${stat.index} + '].quantidadeAtual'"
                        th:value="${item.quantidadeAtual}" />
                </td>

                <td>
                    <input type="number" th:name="'itensCompra[' + ${stat.index} + '].quantidadeMinima'"
                        th:value="${item.quantidadeMinima}" />
                </td>

                <td>
                    <input type="number" th:name="'itensCompra[' + ${stat.index} + '].quantidadeComprar'"
                        th:value="${item.quantidadeComprar}" />
                </td>
            </tr>
        </table>
        <button onclick="gerarPdf()" class="btn w-50 fw-semibold"
            style="background-color: #ffc107; color: black;">Baixar
            Lista</button>
    </div>

    <script th:src="@{/js/compras.js}"></script>

</body>

</html>
