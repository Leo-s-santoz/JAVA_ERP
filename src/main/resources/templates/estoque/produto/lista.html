<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/fundo.css}">
</head>

<body class="bg-light">
    <!--Barra Navegação-->
    <nav class="navbar navbar-expand-lg shadow-sm" style="background-color: #0d6efd; border-bottom: 8px solid #ffc107;">
        <div class="container-fluid px4 fs-5" style="margin: 0 30%">

            <div class="navbar-brand text-white fw-semibold" href="#">
                Estoque Padaria
            </div>

            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link text-white fw-medium active" aria-current="page" href="#">
                            Início
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white fw-medium" th:href="@{/cadastroProduto}">
                            Cadastro
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white fw-medium" th:href="@{/estoqueProduto}">
                            Estoque
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white fw-medium" th:href="@{/movimentacao}">
                            Movimentação
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="fundo-elipse"></div>

    <!--Conteúdo-->
    <div class="container py-5 d-flex justify-content-center align-items-center">

        <div class="card shadow-lg rounded-4 p-1 border-0 justify-content-center align-items-center"
            style="border-top: 6px solid #ffc107; width: 100%; max-width: 90rem;">

            <!--Alertas-->
            <div th:if="${sucesso}" class="alert alert-success text-center mt-3" th:text="${sucesso}"></div>

            <div th:if="${erro}" class="alert alert-danger text-center mt-3" th:text="${erro}"></div>

            <!--Tabela-->
            <table class="table" id="tabela_produtos">
                <thead>
                    <tr>
                        <th scope="col">Nome</th>
                        <th scope="col">Descrição</th>
                        <th scope="col">Estoque Atual</th>
                        <th scope="col">Quantia Mínima</th>
                        <th scope="col">Medida</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="produto:${listaProduto}">
                        <td th:text="${produto.nome}"></td>
                        <td th:text="${produto.descricao}"></td>
                        <td th:text="${produto.quantidadeAtual}"></td>
                        <td th:text="${produto.quantidadeMinima}"></td>
                        <td th:text="${produto.unidade}"></td>
                        <td colspan="2">

                            <a class="p-1" th:href="@{/editarProduto/{id}(id=${produto.id})}"
                                style="text-decoration: none;">
                                <i class="fa-solid fa-pen-to-square" style="color: #77bb41;">
                                </i>Editar</a>

                            <a class="p-1" th:href="@{/excluirProduto/{id}(id=${produto.id})}"
                                style="text-decoration: none;">
                                <i class="fa-solid fa-trash" style="color: #e32400;">
                                </i>Excluir</a>

                            <a class="p-1" data-bs-toggle="modal" data-bs-target="#janela-modal"
                                th:data-id="${produto.id}" th:data-nome="${produto.nome}"
                                th:data-quantidade="${produto.quantidadeAtual}" style="cursor:pointer;">
                                <i class="fa-solid fa-dolly" style="color: #0d6efd;"></i>
                                Movimentação
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>

            <a th:href="@{/listaCompras}" class="btn w-50 fw-semibold" style="background-color: #ffc107; color: black;">
                Gerar Lista de Compras
            </a>
        </div>
    </div>
    <!--Janela modal-->
    <div class="modal" id="janela-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Movimentação</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/registrar}" method="post">
                    <div class="modal-body">


                        <input type="hidden" name="produtoId" id="modalProdutoId">

                        <div class="mb-3">
                            <label class="form-label">Produto</label>
                            <input type="text" class="form-control" id="modalProdutoNome" readonly>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Quantidade Atual</label>
                            <input type="text" class="form-control" id="modalProdutoQuantidade" readonly>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Tipo</label>
                            <select class="form-select" name="tipo" required>
                                <option value="" aria-readonly="true">Selecione</option>
                                <option value="ENTRADA">Entrada</option>
                                <option value="SAIDA">Saída</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Quantidade</label>
                            <input type="number" class="form-control" name="quantidade" min="1" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Obsercação (opcional)</label>
                            <textarea class="form-control" name="observacao" rows="2"></textarea>
                        </div>

                    </div>
                    <div class="modal-footer">

                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"
                            style="background-color: #e32400;">Cancelar</button>

                        <button type="submit" class="btn btn-primary">Confirmar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!--Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!--Font Awesome-->
    <script src="https://kit.fontawesome.com/228568ab87.js" crossorigin="anonymous"></script>
    <script th:src="@{js/movimentacao.js}"></script>
</body>

</html>
