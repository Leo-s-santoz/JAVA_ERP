<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/fundo.css}">
    <style>
        * {
            border-radius: 0 !important;
        }
    </style>
</head>

<body class="text-secondary" style="background-color: #f4f6f8;">
    <!--Barra Navegação-->
    <nav class="navbar navbar-expand-lg shadow-sm" style="background-color: #2f3e4e; border-bottom: 4px solid #d6b25e;">
        <div class="container-fluid px-4 fs-5">

            <div class="navbar-brand text-white fw-semibold" href="#">
                StockFlow ERP
            </div>

            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link text-white fw-medium active" aria-current="page" href="#">
                            Início
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white fw-medium" th:href="@{/estoqueProduto}">
                            Estoque
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white fw-medium" th:href="@{/movimentacao}">
                            Movimentação
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-3 px-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb small text-muted mb-2">
                <li class="breadcrumb-item">Estoque</li>
                <li class="breadcrumb-item active" aria-current="page">Lista de Produtos</li>
            </ol>
        </nav>
    </div>

    <div class="container-fluid py-4 px-4">

        <div style="background-color: #eef1f4; padding: 12px;">
            <div class="card shadow-sm border-0 bg-white" style="border-top: 3px solid #d6b25e;">

                <div class="card-body pb-0">
                    <h5 class="fw-semibold mb-3">Gestão de Estoque</h5>
                </div>

                <!--Alertas-->
                <div th:if="${sucesso}" class="alert alert-success-subtle text-center mt-3" th:text="${sucesso}"></div>

                <div th:if="${erro}" class="alert alert-danger-subtle text-center mt-3" th:text="${erro}"></div>

                <form method="get" th:action="@{/estoqueProduto}" class="row g-3 px-3 pb-3 border-bottom">

                    <!-- Nome -->
                    <div class="col-md-4">
                        <input type="text" name="nome" class="form-control" style="border-radius: 0;"
                            placeholder="Buscar por nome" th:value="${nome}">
                    </div>

                    <!-- Unidade -->
                    <div class="col-md-3">
                        <select name="unidade" class="form-select" style="border-radius: 0;">
                            <option value="" disabled selected>Unidade</option>
                            <option value="KG">Quilograma (kg)</option>
                            <option value="CX">Caixa (cx)</option>
                            <option value="DZ">Dúzia (dz)</option>
                            <option value="UN">Unidade (un)</option>
                        </select>
                    </div>

                    <!-- Estoque Baixo -->
                    <div class="col-md-3">
                        <select name="estoqueBaixo" class="form-select" style="border-radius: 0;">
                            <option value="">Estoque</option>
                            <option value="true" th:selected="${estoqueBaixo == true}">
                                Estoque Baixo
                            </option>
                        </select>
                    </div>

                    <!-- Botão -->
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-outline-primary w-100" style="opacity: 0.9;">
                            Buscar
                        </button>
                    </div>

                </form>
                <div class="d-flex justify-content-between align-items-center px-3 py-3">
                    <div class="d-flex gap-2">
                        <a th:href="@{/estoqueProduto}" class=" btn btn-outline-dark btn-sm">Limpar Filtros</a>
                        <select class="form-select form-select-sm border-0 bg-body-tertiary"
                            style="width: 80px; border-radius: 0;">
                            <option value="" disabled selected>Selecione</option>
                            <option>15</option>
                            <option>30</option>
                            <option>50</option>
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-primary btn-sm" data-bs-toggle="modal"
                            data-bs-target="#modalCadastroProduto" style="opacity: 0.9;">+ Adicionar</button>
                    </div>
                </div>

                <!--Tabela-->
                <div class="table-responsive px-3">
                    <table class="table table-hover align-middle" id="tabela_produtos">
                        <thead class="table-light text-secondary">
                            <tr>
                                <th scope="col">ID</th>
                                <th scope="col">Nome</th>
                                <th scope="col">Descrição</th>
                                <th scope="col">Estoque Atual</th>
                                <th scope="col">Quantia Mínima</th>
                                <th scope="col">Medida</th>
                                <th scope="col" class="text-end">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="produto:${listaProduto}"
                                th:classappend="${produto.quantidadeAtual <= produto.quantidadeMinima} ? 'table-danger'">
                                <td th:text="${produto.id}"></td>
                                <td th:text="${produto.nome}"></td>
                                <td th:text="${produto.descricao}"></td>
                                <td th:text="${produto.quantidadeAtual}"></td>
                                <td th:text="${produto.quantidadeMinima}"></td>
                                <td th:text="${produto.unidade}"></td>
                                <td class="text-end">
                                    <div class="d-flex justify-content-end gap-2">
                                        <a th:href="@{/editarProduto/{id}(id=${produto.id})}"
                                            class="text-decoration-none text-primary d-flex align-items-center gap-1"
                                            style="transition: 0.2s;">
                                            <i class="fa-solid fa-pen-to-square"></i>
                                            <span>Editar</span>
                                        </a>
                                        <a th:href="@{/excluirProduto/{id}(id=${produto.id})}"
                                            class="text-decoration-none text-danger d-flex align-items-center gap-1"
                                            style="transition: 0.2s;">
                                            <i class="fa-solid fa-trash"></i>
                                            <span>Excluir</span>
                                        </a>
                                        <a data-bs-toggle="modal" data-bs-target="#janela-modal"
                                            th:data-id="${produto.id}" th:data-nome="${produto.nome}"
                                            th:data-quantidade="${produto.quantidadeAtual}"
                                            class="text-warning d-flex align-items-center gap-1"
                                            style="cursor:pointer; transition: 0.2s;">
                                            <i class="fa-solid fa-dolly"></i>
                                            <span>Mov.</span>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-between align-items-center px-3 py-2 border-top small text-muted">
                    <span>Total de registros: <span th:text="${#lists.size(listaProduto)}"></span></span>
                </div>

            </div>
        </div>
    </div>
    <!--Modal Mov-->
    <div class="modal" id="janela-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content" style="border-radius: 0;">
                <div class="modal-header">
                    <h5 class="text-center mb-4 fw-semibold">Movimentação</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/registrar}" method="post">
                    <div class="modal-body">
                        <input type="hidden" name="produtoId" id="modalProdutoId">
                        <div class="mb-3">
                            <label class="form-label">Produto</label>
                            <input type="text" class="form-control" style="border-radius: 0;" id="modalProdutoNome"
                                readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Quantidade Atual</label>
                            <input type="text" class="form-control" style="border-radius: 0;"
                                id="modalProdutoQuantidade" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tipo</label>
                            <select class="form-select" style="border-radius: 0;" name="tipo" required>
                                <option value="" aria-readonly="true">Selecione</option>
                                <option value="ENTRADA">Entrada</option>
                                <option value="SAIDA">Saída</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Quantidade</label>
                            <input type="number" class="form-control" style="border-radius: 0;" name="quantidade"
                                min="1" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Obsercação (opcional)</label>
                            <textarea class="form-control" style="border-radius: 0;" name="observacao"
                                rows="2"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary"
                            onclick="window.location.href='/estoqueProduto'">Cancelar</button>
                        <button type="submit" class="btn btn-outline-primary">Confirmar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!--Modal Cadastro-->
    <div class="modal fade" id="modalCadastroProduto" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content" style="border-radius: 0;">
                <div class="modal-header">
                    <h5 class="text-center mb-4 fw-semibold">
                        Cadastrar Produto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form action="/salvarProduto" th:object="${produto}" method="post">
                    <div class="modal-body">
                        <div class="mb-3">
                            <input th:field="*{id}" type="hidden" class="form-control" style="border-radius: 0;"
                                placeholder="#Id">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nome</label>
                            <input th:field="*{nome}" type="text" class="form-control" style="border-radius: 0;"
                                placeholder="Nome do produto">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descrição</label>
                            <textarea th:field="*{descricao}" class="form-control" style="border-radius: 0;"
                                rows="3"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Quantidade mínima</label>
                                <input th:field="*{quantidadeMinima}" type="number" class="form-control"
                                    style="border-radius: 0;">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Quantidade Atual</label>
                                <input th:field="*{quantidadeAtual}" type="number" class="form-control"
                                    style="border-radius: 0;">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Preço de Custo<label>
                                        <input type="text" class="form-control money" style="border-radius: 0;"
                                            th:field="*{precoCusto}" placeholder="0.00" id="precoCusto">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Preço de Venda</label>
                                <input type="text" class="form-control money" style="border-radius: 0;"
                                    th:field="*{precoVenda}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Margem de Lucro (%)</label>
                                <input type="text" class="form-control" style="border-radius: 0;" id="margemLucro"
                                    readonly>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Unidade</label>
                            <select th:field="*{unidade}" class="form-select" style="border-radius: 0;">
                                <option value="KG">Quilograma (kg)</option>
                                <option value="CX">Caixa (cx)</option>
                                <option value="DZ">Dúzia (dz)</option>
                                <option value="UN">Unidade (un)</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary"
                            onclick="window.location.href='/estoqueProduto'">Cancelar</button>
                        <button type="submit" class="btn btn-outline-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:src="@{js/cadastro.js}"></script>

    <!--Abrir Modal Edit-->
    <script th:if="${abrirModal}">
        document.addEventListener("DOMContentLoaded", function () {
            var modal = new bootstrap.Modal(document.getElementById('modalCadastroProduto'));
            modal.show();
        });
    </script>
    <!--Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!--Font Awesome-->
    <script src="https://kit.fontawesome.com/228568ab87.js" crossorigin="anonymous"></script>
    <script th:src="@{js/movimentacao.js}"></script>

    <!--JQuery-->
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script>$('.money').mask('000.000.000.000.000,00', { reverse: true });</script>
</body>

</html>
