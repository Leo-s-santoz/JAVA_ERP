<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/fundo.css}">
</head>

<body class="bg-light">
    <!--Barra Navegação-->
    <nav class="navbar navbar-expand-lg shadow-sm" style="background-color: #0d6efd; border-bottom: 8px solid #ffc107;">
        <div class="container-fluid px4 fs-5" style="margin: 0 30%">

            <div class="navbar-brand text-white fw-semibold" href="#">
                Estoque Padaria
            </div>

            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link text-white fw-medium active" aria-current="page" href="#">
                            Início
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white fw-medium" th:href="@{/cadastroProduto}">
                            Cadastro
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white fw-medium" th:href="@{/estoqueProduto}">
                            Estoque
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white fw-medium" th:href="@{/movimentacao}">
                            Movimentação
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="fundo-elipse"></div>

    <!--Conteúdo-->
    <div class="container py-5 d-flex justify-content-center">

        <div class="card shadow-lg rounded-4 p-3 border-0"
            style="border-top: 6px solid #ffc107; width: 100%; max-width: 90rem;">

            <h4 class="mb-4 text-center fw-semibold">Histórico de Movimentações</h4>

            <!--Filtros-->
            <form action="/movimentacao" method="get" class="row g-3 mb-4">

                <div class="col-md-4">
                    <label class="form-label">Produto</label>

                    <select name="produtoId">
                        <option value="">Todos</option>
                        <option th:each="produto : ${produtos}" th:value="${produto.id}" th:text="${produto.nome}"
                            th:selected="${produto.id == produtoId}">
                        </option>
                    </select>

                </div>

                <div class="col-md-3">
                    <label class="form-label">Tipo</label>
                    <select name="tipo" class="form-select">
                        <option value="">Todos</option>
                        <option value="ENTRADA"
                            th:selected="${tipo == T(com.leonardo.controle_estoque.utils.TipoMovimentacao).ENTRADA}">
                            Entrada</option>
                        <option value="SAIDA"
                            th:selected="${tipo == T(com.leonardo.controle_estoque.utils.TipoMovimentacao).SAIDA}">
                            Saída</option>

                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Data</label>
                    <input name="data" type="date" class="form-control" th:value="${data}">
                </div>

                <div class="col-md-2 d-flex align-items-end">
                    <button class="btn btn-primary w-100">
                        Filtrar
                    </button>
                </div>

            </form>
            <!--Tabela-->
            <table class="table table-hover align-middle">

                <thead class="table-light">
                    <tr>
                        <th>Data</th>
                        <th>Produto</th>
                        <th>Tipo</th>
                        <th>Quantidade</th>
                        <th>Observação</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="mov : ${listaMovimentacoes}">
                        <td th:text="${#temporals.format(mov.data, 'dd/MM/yyyy HH:mm')}"></td>

                        <td th:text="${mov.produto.nome}"></td>

                        <td>
                            <span class="badge bg-success" th:if="${mov.tipo.name() == 'ENTRADA'}">
                                Entrada
                            </span>

                            <span class="badge bg-danger" th:if="${mov.tipo.name() == 'SAIDA'}">
                                Saída
                            </span>
                        </td>

                        <td th:text="${mov.quantidade}"></td>

                        <td th:text="${mov.observacao}"></td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>
    <!--Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!--Font Awesome-->
    <script src="https://kit.fontawesome.com/228568ab87.js" crossorigin="anonymous"></script>

    <script th:src="@{js/movimentacao.js}"></script>
</body>

</html>
